<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HiTalent | Panel de Control</title>
    <style>
        /* =========================================================
           SISTEMA DE DISEÑO HITALENT - MODO CLARO PURO Y LUMINOSO
           ========================================================= */

        :root {
            /* Paleta de Colores */
            --color-primario: #2563eb;
            --color-primario-hover: #3b82f6;
            --fondo-pantalla: #f8fafc;
            --fondo-contenedor: #ffffff;
            --fondo-seccion: #eff6ff;
            --texto-principal: #334155;
            --texto-etiquetas: #1e293b;
            --borde-suave: #e2e8f0;
        }

        /* Reseteo y Tipografía Global */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--fondo-pantalla);
            color: var(--texto-principal);
            line-height: 1.6;
            padding: 20px;
        }

        /* Contenedor Principal (Tarjeta Limpia) */
        .container {
            max-width: 1200px; /* Ajustado para que quepan bien las tablas */
            margin: 0 auto;
            background: var(--fondo-contenedor);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--borde-suave);
        }

        /* Encabezados de Página */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--borde-suave);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-title h1 {
            color: var(--color-primario);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        /* Títulos de Sección */
        .section-title {
            background-color: var(--fondo-seccion);
            color: var(--color-primario);
            border-left: 4px solid var(--color-primario);
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 15px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
            letter-spacing: 1px;
        }

        /* TABS (Adaptado al nuevo sistema) */
        .tabs { display: flex; gap: 10px; }
        
        .tab-btn {
            background-color: var(--fondo-contenedor);
            border: 1px solid var(--borde-suave);
            color: var(--texto-principal);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 14px;
        }
        
        .tab-btn:hover {
            background-color: var(--fondo-seccion);
            border-color: #bfdbfe;
        }
        
        .tab-btn.active-tab {
            background-color: var(--color-primario);
            color: var(--fondo-contenedor);
            border-color: var(--color-primario);
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-actualizar {
            background-color: #ecfdf5;
            color: #059669;
            border-color: #a7f3d0;
        }

        .btn-actualizar:hover {
            background-color: #059669;
            color: white;
            box-shadow: 0 4px 6px rgba(5, 150, 105, 0.2);
        }

        .tab-content { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }

        /* TABLAS (Adaptado al nuevo sistema) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--fondo-contenedor);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--borde-suave);
        }
        
        th {
            text-align: left;
            padding: 15px;
            color: var(--color-primario);
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            background-color: var(--fondo-seccion);
            border-bottom: 2px solid var(--borde-suave);
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid var(--borde-suave);
            font-size: 14px;
            color: var(--texto-principal);
        }

        /* BOTONES (Del nuevo sistema) */
        .btn-principal {
            background-color: var(--color-primario);
            color: var(--fondo-contenedor);
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.15);
        }

        .btn-principal:hover {
            background-color: var(--color-primario-hover);
            transform: translateY(-1px);
        }

        /* MODAL Y DETALLES (Adaptado al nuevo sistema) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(3px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: var(--fondo-contenedor);
            padding: 0;
            border-radius: 12px;
            max-width: 900px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--borde-suave);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .modal-header {
            position: sticky;
            top: 0;
            background: var(--fondo-contenedor);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borde-suave);
            z-index: 2;
        }
        
        .modal-header h2 { color: var(--color-primario); margin: 0; font-size: 20px; text-transform: uppercase;}
        .modal-body { padding: 25px; }
        
        .close-btn {
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            color: #94a3b8;
            transition: color 0.2s;
        }
        .close-btn:hover { color: var(--texto-etiquetas); }

        /* Sistema de Cuadrícula (Grids adaptados para los datos) */
        .grid-datos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .dato-item { display: flex; flex-direction: column; }
        
        .label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--texto-etiquetas);
            text-transform: uppercase;
        }
        
        .valor {
            font-size: 14px;
            color: var(--texto-principal);
            line-height: 1.5;
            background-color: var(--fondo-pantalla);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--borde-suave);
        }

        .seccion-card {
            margin-bottom: 25px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Diseño Responsivo */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
            .container { padding: 25px 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">
            <h1>HiTalent Admin</h1>
        </div>
        <div class="tabs">
            <button class="tab-btn active-tab" onclick="cambiarVista('req', this)">Requisiciones</button>
            <button class="tab-btn" onclick="cambiarVista('cand', this)">Candidatos</button>
            <button class="tab-btn btn-actualizar" onclick="cargarDatos()">Actualizar</button>
        </div>
    </div>

    <div id="div-req" class="tab-content active">
        <table id="tabla-req">
            <thead><tr><th>Empresa</th><th>Puesto</th><th>Estatus</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="div-cand" class="tab-content">
        <table id="tabla-cand">
            <thead><tr><th>Nombre</th><th>Puesto</th><th>Estatus</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo">Detalle de Requisición</h2>
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybqu3o-oT1uOHSfCHDAES2L_-FgZil48c8f7ZKjJ7LC3VjFEnww8WPWtsQhWDIAN8_/exec";

    function cambiarVista(id, btn) {
        document.querySelectorAll('.tab-content').forEach(d => d.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('div-' + id).classList.add('active');
        btn.classList.add('active-tab');
    }

    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const tbodyReq = document.querySelector('#tabla-req tbody');
            tbodyReq.innerHTML = data.requisiciones.map(item => `
                <tr>
                    <td>${item.EMPRESA_CLIENTE}</td>
                    <td>${item.NOMBRE_POSICION}</td>
                    <td>${item.ESTATUS}</td>
                    <td><button class="btn-principal" onclick='verDetalleReq(${JSON.stringify(item)})'>Ver Ficha</button></td>
                </tr>
            `).join('');

            const tbodyCand = document.querySelector('#tabla-cand tbody');
            tbodyCand.innerHTML = data.candidatos.map(item => `
                <tr>
                    <td>${item.NOMBRE_CANDIDATO}</td>
                    <td>${item.ID_REQUISICION}</td>
                    <td>${item.ESTATUS_PROCESO}</td>
                    <td><button class="btn-principal" onclick='verDetalleCand(${JSON.stringify(item)})'>Ver Ficha</button></td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    // Renderizado por bloques para Requisiciones integrando el nuevo CSS
    function verDetalleReq(d) {
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Requisición: ${d.NOMBRE_POSICION}`;
        
        body.innerHTML = `
            <div class="seccion-card">
                <div class="section-title">1. Generales</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Solicitante</span><span class="valor">${d.NOMBRE_SOLICITANTE}</span></div>
                    <div class="dato-item"><span class="label">Empresa</span><span class="valor">${d.EMPRESA_CLIENTE}</span></div>
                    <div class="dato-item"><span class="label">Contacto</span><span class="valor">Tel: ${d.TELEFONO_CONTACTO} / Cel: ${d.CELULAR_CONTACTO}</span></div>
                    <div class="dato-item"><span class="label">Email</span><span class="valor">${d.EMAIL_CONTACTO}</span></div>
                    <div class="dato-item"><span class="label">Vacantes</span><span class="valor">${d.NUMERO_VACANTES} (${d.TIPO_VACANTE})</span></div>
                    <div class="dato-item"><span class="label">Ubicación</span><span class="valor">${d.UBICACION}</span></div>
                    <div class="dato-item"><span class="label">Horario</span><span class="valor">${d.HORARIO_LABORAL}</span></div>
                    <div class="dato-item"><span class="label">Reporta a</span><span class="valor">${d.REPORTA_A}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">2. Información del Perfil</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Edad y Edo. Civil</span><span class="valor">${d.EDAD_MIN_MAX} / ${d.ESTADO_CIVIL}</span></div>
                    <div class="dato-item"><span class="label">Género</span><span class="valor">${d.GENERO}</span></div>
                    <div class="dato-item"><span class="label">Escolaridad</span><span class="valor">${d.ESCOLARIDAD}</span></div>
                </div>
                <div class="dato-item" style="margin-bottom: 10px;">
                    <span class="label">Objetivo del Puesto</span><div class="valor">${d.OBJETIVO_PUESTO}</div>
                </div>
                <div class="dato-item" style="margin-bottom: 10px;">
                    <span class="label">Experiencia e Indispensables</span><div class="valor">${d.EXPERIENCIA_REQUERIDA}<br><br>${d.REQUISITOS_INDISPENSABLES}</div>
                </div>
                <div class="dato-item">
                    <span class="label">Habilidades Tecnológicas</span><div class="valor">${d.HABILIDADES_TECNOLOGICAS}</div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">3. Verificación / Actividades</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Competencias</span><span class="valor">${d.COMPETENCIAS_EVALUAR}</span></div>
                </div>
                <div class="dato-item">
                    <span class="label">Actividades a Desempeñar</span><div class="valor">${d.ACTIVIDADES_DESEMPENAR}</div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">4. Sueldos y Prestaciones</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Sueldo Bruto/Neto</span><span class="valor">B: ${d.SUELDO_BRUTO} / N: ${d.SUELDO_NETO}</span></div>
                    <div class="dato-item"><span class="label">Esquema / Frecuencia</span><span class="valor">${d.ESQUEMA_PAGO} / ${d.FRECUENCIA_PAGO}</span></div>
                    <div class="dato-item"><span class="label">Prestaciones</span><span class="valor">${d.PRESTACIONES_LEY}<br>${d.PRESTACIONES_SUPERIORES}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">5. Tipo de Contrato</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Contratación</span><span class="valor">${d.TIPO_CONTRATO}</span></div>
                    <div class="dato-item"><span class="label">Periodo de Prueba</span><span class="valor">${d.PERIODO_PRUEBA}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">6. Auto / Transporte</div>
                <div class="valor">${d.REQUISITOS_AUTO_TRANSPORTE}</div>
            </div>

            <div class="seccion-card">
                <div class="section-title">7. Observaciones Extras</div>
                <div class="valor" style="white-space: pre-wrap;">${d.OBSERVACIONES_EXTRAS}</div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    // Vista simplificada para Candidatos integrando el nuevo CSS
    function verDetalleCand(c) {
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Candidato: ${c.NOMBRE_CANDIDATO}`;
        body.innerHTML = `
            <div class="seccion-card">
                <div class="section-title">Datos del Postulante</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Teléfono</span><span class="valor">${c.TELEFONO}</span></div>
                    <div class="dato-item"><span class="label">Correo</span><span class="valor">${c.CORREO}</span></div>
                    <div class="dato-item"><span class="label">Estatus</span><span class="valor">${c.ESTATUS_PROCESO}</span></div>
                    <div class="dato-item"><span class="label">CV</span><span class="valor"><a href="${c.LINK_CV}" target="_blank" style="color:var(--color-primario); font-weight: bold; text-decoration: none;">Abrir Currículum</a></span></div>
                </div>
            </div>
            <div class="seccion-card">
                <div class="section-title">Notas del Reclutador</div>
                <div class="valor" style="white-space: pre-wrap;">${c.NOTAS_RECLUTADOR || 'Sin notas'}</div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = cargarDatos;
</script>
</body>
</html>
