<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - HiTalent</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,700' rel='stylesheet' type='text/css'>
    <style>
        :root {
            --azul-neon: #3b82f6;
            --azul-hover: #2563eb;
            --texto-claro: #f8fafc;
            --texto-mutado: #94a3b8;
            --borde-glass: rgba(255, 255, 255, 0.15);
            --fondo-glass: rgba(15, 23, 42, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Lato', sans-serif; }

        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            color: var(--texto-claro);
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Estilos de fondo parallax (Iguales al formulario) */
        #stars, #stars2, #stars3 { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #stars { background: transparent; box-shadow: 100px 100px #FFF, 500px 300px #FFF; animation: animStar 50s linear infinite; }
        @keyframes animStar { from { transform: translateY(0px); } to { transform: translateY(-2000px); } }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--fondo-glass);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--borde-glass);
            position: relative;
            z-index: 10;
        }

        h1 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        
        /* Navegación de pestañas */
        nav { display: flex; gap: 10px; margin-bottom: 30px; }
        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--borde-glass);
            color: var(--texto-claro);
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        button:hover, button.active-tab { background: var(--azul-neon); border-color: var(--azul-neon); }

        /* Contenido de pestañas */
        .tab-content { display: none; }
        .active { display: block; }

        /* Tabla industrial */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
        th { background: rgba(59, 130, 246, 0.2); padding: 15px; text-align: left; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; color: var(--azul-neon); }
        td { padding: 15px; border-bottom: 1px solid var(--borde-glass); font-size: 14px; }
        tr:hover { background: rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>

    <div class="container">
        <h1>Dashboard <span style="color:var(--azul-neon)">HiTalent</span></h1>

        <nav>
            <button class="active-tab" onclick="mostrar(event, 'requisiciones')">Requisiciones</button>
            <button onclick="mostrar(event, 'candidatos')">Candidatos</button>
        </nav>

        <div id="requisiciones" class="tab-content active">
            <h2>Requisiciones Recibidas</h2>
            <table>
                <thead><tr><th>Empresa</th><th>Puesto</th><th>Ubicación</th><th>Detalles</th></tr></thead>
                <tbody id="tabla-requisiciones">
                    <tr><td>Ejemplo S.A.</td><td>Desarrollador</td><td>Monterrey</td><td><button style="padding:5px 10px;">Ver</button></td></tr>
                </tbody>
            </table>
        </div>

        <div id="candidatos" class="tab-content">
            <h2>Base de Candidatos</h2>
            <table>
                <thead><tr><th>Nombre</th><th>Puesto</th><th>CV</th><th>Contacto</th></tr></thead>
                <tbody id="tabla-candidatos">
                    <tr><td>Juan Pérez</td><td>IT Engineer</td><td>[PDF]</td><td>juan@email.com</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function mostrar(event, id) {
            // Ocultar todos
            document.querySelectorAll('.tab-content').forEach(div => div.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab'));
            
            // Mostrar seleccionado
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active-tab');
        }
    </script>
</body>
</html>
