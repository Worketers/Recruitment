<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Worketers | Panel de Control Avanzado</title>
    <style>
        /* =========================================================
           SISTEMA DE DISEÑO WORKETERS - MODO CLARO PURO Y LUMINOSO
           ========================================================= */

        :root {
            /* Paleta de Colores Worketers */
            --color-primario: #0096a3;       /* rgb(0, 150, 163) */
            --color-primario-hover: #2ac2b5; /* rgb(42, 194, 181) */
            --color-primario-dark: #26857d;  /* rgb(38, 133, 125) */
            
            /* Grises y Fondos (Modo Claro) */
            --fondo-pantalla: #f8fafc;
            --fondo-contenedor: #ffffff;
            --fondo-seccion: #eef8f8;        /* Turquesa extra claro para secciones */
            --texto-principal: #334155;
            --texto-etiquetas: #1e293b;
            --borde-suave: #e2e8f0;
            --color-exito: #10b981;
        }

        /* Reseteo y Tipografía Global */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--fondo-pantalla);
            color: var(--texto-principal);
            line-height: 1.6;
            padding: 20px;
        }

        /* Contenedor Principal (Tarjeta Limpia) */
        .container {
            max-width: 1300px; /* Ampliado para que las tablas de datos tengan espacio */
            margin: 0 auto;
            background: var(--fondo-contenedor);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--borde-suave);
        }

        /* Encabezados de Página */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--borde-suave);
            padding-bottom: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            color: var(--color-primario);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-title p {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }

        /* Controles de búsqueda y filtros */
        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        
        /* Entradas de Texto Integradas */
        .search-input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--borde-suave);
            border-radius: 6px;
            font-size: 14px;
            color: var(--texto-principal);
            background-color: var(--fondo-contenedor);
            transition: all 0.2s ease;
            outline: none;
        }
        
        .search-input::placeholder, textarea::placeholder { color: #94a3b8; }
        
        .search-input:focus, select:focus, textarea:focus {
            border-color: var(--color-primario);
            box-shadow: 0 0 0 4px rgba(0, 150, 163, 0.1);
            background-color: var(--fondo-contenedor);
        }

        /* TABS de Navegación */
        .tabs { display: flex; gap: 10px; }
        .tab-btn {
            background-color: var(--fondo-contenedor);
            border: 1px solid var(--borde-suave);
            color: var(--texto-principal);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 14px;
        }
        
        .tab-btn:hover {
            background-color: var(--fondo-seccion);
            border-color: var(--color-primario-hover);
        }
        
        .tab-btn.active-tab {
            background-color: var(--color-primario);
            color: var(--fondo-contenedor);
            border-color: var(--color-primario);
            box-shadow: 0 4px 6px rgba(0, 150, 163, 0.2);
        }

        .btn-actualizar {
            background-color: var(--fondo-seccion);
            color: var(--color-primario-dark);
            border-color: var(--color-primario-hover);
        }
        
        .btn-actualizar:hover {
            background-color: var(--color-primario-dark);
            color: white;
        }

        .tab-content { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }

        /* TABLAS DE DATOS */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--fondo-contenedor);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--borde-suave);
        }
        
        th {
            text-align: left;
            padding: 12px 15px;
            color: var(--color-primario-dark);
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            background-color: var(--fondo-seccion);
            border-bottom: 2px solid var(--borde-suave);
        }
        
        td { padding: 12px 15px; border-bottom: 1px solid var(--borde-suave); font-size: 14px; }
        tr:hover { background-color: var(--fondo-seccion); }

        /* Badges de Estado adaptados a Worketers */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
        }
        .badge-activa { background-color: #ccfbf1; color: #0f766e; } /* Tonos Teal */
        .badge-pendiente { background-color: #fef9c3; color: #854d0e; }
        .badge-proceso { background-color: #e0f2fe; color: #0369a1; }
        .badge-cerrada { background-color: #f1f5f9; color: #475569; }

        /* Títulos de Sección (Modales) */
        .section-title {
            background-color: var(--fondo-seccion);
            color: var(--color-primario-dark);
            border-left: 4px solid var(--color-primario);
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 20px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }

        /* Botón de Acción Principal de Worketers */
        .btn-principal {
            background-color: var(--color-primario);
            color: var(--fondo-contenedor);
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0, 150, 163, 0.2);
        }

        .btn-principal:hover {
            background-color: var(--color-primario-hover);
            box-shadow: 0 6px 8px rgba(0, 150, 163, 0.3);
            transform: translateY(-1px);
        }

        .btn-principal:active {
            transform: scale(0.98);
            box-shadow: 0 2px 4px rgba(0, 150, 163, 0.2);
        }

        /* Modales Interactivos */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: var(--fondo-contenedor);
            border-radius: 12px;
            max-width: 900px;
            width: 95%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--borde-suave);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .modal-header {
            position: sticky; top: 0; background: var(--fondo-contenedor);
            padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--borde-suave); z-index: 10;
        }
        
        .modal-header h2 { color: var(--color-primario); font-size: 18px; text-transform: uppercase;}
        .modal-body { padding: 20px 25px; }
        
        .close-btn { cursor: pointer; font-size: 24px; color: #94a3b8; transition: color 0.2s; }
        .close-btn:hover { color: var(--color-primario-dark); }

        /* Cuadrículas de datos dentro del modal */
        .grid-datos { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .dato-item { display: flex; flex-direction: column; }
        
        .label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--texto-etiquetas);
            text-transform: uppercase;
        }
        
        .valor {
            font-size: 13px;
            color: var(--texto-principal);
            background-color: var(--fondo-pantalla);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--borde-suave);
        }

        textarea { resize: vertical; min-height: 80px; }

        .btn-guardar {
            background-color: var(--color-primario-dark);
            color: white; padding: 10px 20px;
            border: none; border-radius: 6px; font-size: 13px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; margin-top: 15px; float: right;
            box-shadow: 0 4px 6px rgba(38, 133, 125, 0.2);
            transition: all 0.2s ease;
        }
        .btn-guardar:hover { background-color: var(--color-primario); transform: translateY(-1px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Diseño Responsivo */
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; justify-content: center; }
            .container { padding: 25px 20px; }
            .grid-datos { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-title">
            <h1>Panel Worketers</h1>
            <p>Gestión de Talento y Requisiciones</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active-tab" onclick="cambiarVista('req', this)">Requisiciones</button>
            <button class="tab-btn" onclick="cambiarVista('cand', this)">Candidatos</button>
            <button class="tab-btn btn-actualizar" onclick="cargarDatos()">Actualizar Panel</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="input-busqueda" class="search-input" placeholder="Buscar en la tabla actual..." onkeyup="filtrarTabla()">
    </div>

    <div id="div-req" class="tab-content active">
        <table id="tabla-req">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Empresa</th>
                    <th>Puesto Vacante</th>
                    <th>Postulados</th>
                    <th>Estatus</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody><tr><td colspan="6" style="text-align:center;">Cargando datos...</td></tr></tbody>
        </table>
    </div>

    <div id="div-cand" class="tab-content">
        <table id="tabla-cand">
            <thead>
                <tr>
                    <th>Fecha Postulación</th>
                    <th>Nombre Candidato</th>
                    <th>Vacante Aplicada</th>
                    <th>Estatus Proceso</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody><tr><td colspan="5" style="text-align:center;">Cargando datos...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo">Detalles</h2>
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>

<script>
    // URL de tu Web App de Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbybqu3o-oT1uOHSfCHDAES2L_-FgZil48c8f7ZKjJ7LC3VjFEnww8WPWtsQhWDIAN8_/exec";
    
    let datosGlobales = { requisiciones: [], candidatos: [] };
    let vistaActual = 'req';

    function cambiarVista(id, btn) {
        vistaActual = id;
        document.querySelectorAll('.tab-content').forEach(d => d.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('div-' + id).classList.add('active');
        btn.classList.add('active-tab');
        document.getElementById('input-busqueda').value = ""; 
        filtrarTabla();
    }

    function formatearFecha(fechaStr) {
        if(!fechaStr) return "N/A";
        const d = new Date(fechaStr);
        if(isNaN(d.getTime())) return fechaStr.split("T")[0];
        return d.toLocaleDateString('es-MX', {day: '2-digit', month: '2-digit', year: 'numeric'});
    }

    function obtenerBadgeEstatus(estatus) {
        const est = (estatus || '').toLowerCase();
        if(est.includes('activ') || est.includes('contratado')) return `<span class="badge badge-activa">${estatus}</span>`;
        if(est.includes('pendient') || est.includes('entrevista')) return `<span class="badge badge-pendiente">${estatus}</span>`;
        if(est.includes('proceso')) return `<span class="badge badge-proceso">${estatus}</span>`;
        return `<span class="badge badge-cerrada">${estatus || 'Desconocido'}</span>`;
    }

    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            datosGlobales = await res.json();
            renderizarTablas();
        } catch(e) { 
            console.error(e); 
            alert("Error al conectar con la base de datos de Sheets.");
        }
    }

    function renderizarTablas() {
        const tbodyReq = document.querySelector('#tabla-req tbody');
        const reqsOrdenadas = [...datosGlobales.requisiciones].reverse();
        
        tbodyReq.innerHTML = reqsOrdenadas.map(item => {
            const totalCandidatos = datosGlobales.candidatos.filter(c => c.ID_REQUISICION === item.ID_REQUISICION).length;
            
            return `
                <tr>
                    <td>${formatearFecha(item.FECHA_CREACION)}</td>
                    <strong><td>${item.EMPRESA_CLIENTE}</td></strong>
                    <td>${item.NOMBRE_POSICION}</td>
                    <td style="font-weight:bold; color:var(--color-primario);">${totalCandidatos} Refs</td>
                    <td>${obtenerBadgeEstatus(item.ESTATUS)}</td>
                    <td><button class="btn-principal" onclick='verDetalleReq("${item.ID_REQUISICION}")'>Gestionar</button></td>
                </tr>
            `;
        }).join('');

        const tbodyCand = document.querySelector('#tabla-cand tbody');
        const candOrdenados = [...datosGlobales.candidatos].reverse();
        
        tbodyCand.innerHTML = candOrdenados.map(item => {
            const vacante = datosGlobales.requisiciones.find(r => r.ID_REQUISICION === item.ID_REQUISICION);
            const nombreVacante = vacante ? `${vacante.NOMBRE_POSICION} (${vacante.EMPRESA_CLIENTE})` : item.ID_REQUISICION;

            return `
                <tr>
                    <td>${formatearFecha(item.FECHA_POSTULACION)}</td>
                    <strong><td>${item.NOMBRE_CANDIDATO}</td></strong>
                    <td style="font-size:12px;">${nombreVacante}</td>
                    <td>${obtenerBadgeEstatus(item.ESTATUS_PROCESO)}</td>
                    <td><button class="btn-principal" onclick='verDetalleCand("${item.ID_POSTULACION}")'>Evaluar</button></td>
                </tr>
            `;
        }).join('');
    }

    function filtrarTabla() {
        const query = document.getElementById('input-busqueda').value.toLowerCase();
        const tablaId = vistaActual === 'req' ? 'tabla-req' : 'tabla-cand';
        const filas = document.querySelectorAll(`#${tablaId} tbody tr`);
        
        filas.forEach(filas => {
            const texto = filas.innerText.toLowerCase();
            filas.style.display = texto.includes(query) ? '' : 'none';
        });
    }

    function verDetalleReq(idReq) {
        const d = datosGlobales.requisiciones.find(r => r.ID_REQUISICION === idReq);
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Requisición: ${d.NOMBRE_POSICION}`;
        
        body.innerHTML = `
            <div class="seccion-card" style="background:var(--fondo-seccion); padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid var(--borde-suave);">
                <label class="label">Cambiar Estatus Operativo de la Vacante</label>
                <select id="edit-req-estatus">
                    <option value="Activa" ${d.ESTATUS === 'Activa'?'selected':''}>Activa / Abierta</option>
                    <option value="Pausada" ${d.ESTATUS === 'Pausada'?'selected':''}>Pausada / En Espera</option>
                    <option value="Cubierta" ${d.ESTATUS === 'Cubierta'?'selected':''}>Cubierta / Cerrada</option>
                </select>
                <button class="btn-guardar" onclick="guardarCambiosReq('${d.ID_REQUISICION}')">Actualizar Vacante</button>
                <div style="clear:both;"></div>
            </div>

            <div class="seccion-card">
                <div class="section-title">1. Datos de Contacto y Empresa</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Empresa Cliente</span><span class="valor">${d.EMPRESA_CLIENTE}</span></div>
                    <div class="dato-item"><span class="label">Solicitante</span><span class="valor">${d.NOMBRE_SOLICITANTE}</span></div>
                    <div class="dato-item"><span class="label">Contacto</span><span class="valor">Tel: ${d.TELEFONO_CONTACTO} / Cel: ${d.CELULAR_CONTACTO}</span></div>
                    <div class="dato-item"><span class="label">Email</span><span class="valor">${d.EMAIL_CONTACTO}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="section-title">2. Perfil y Requisitos Técnico-Competenciales</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Vacantes</span><span class="valor">${d.NUMERO_VACANTES} (${d.TIPO_VACANTE})</span></div>
                    <div class="dato-item"><span class="label">Ubicación / Horarios</span><span class="valor">${d.UBICACION} | ${d.HORARIO_LABORAL}</span></div>
                    <div class="dato-item"><span class="label">Escolaridad Mínima</span><span class="valor">${d.ESCOLARIDAD}</span></div>
                    <div class="dato-item"><span class="label">Idiomas Requeridos</span><span class="valor">${d.IDIOMAS || 'No especifica'}</span></div>
                </div>
                <div class="dato-item" style="margin-top:10px;"><span class="label">Objetivo de la Posición</span><div class="valor">${d.OBJETIVO_PUESTO}</div></div>
                <div class="dato-item" style="margin-top:10px;"><span class="label">Experiencia Requerida e Indispensables</span><div class="valor">${d.EXPERIENCIA_REQUERIDA}<br><br><b>Obligatorio:</b> ${d.REQUISITOS_INDISPENSABLES}</div></div>
                <div class="dato-item" style="margin-top:10px;"><span class="label">Habilidades de Tecnología</span><div class="valor">${d.HABILIDADES_TECNOLOGICAS || 'Ninguna'}</div></div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function verDetalleCand(idPost) {
        const c = datosGlobales.candidatos.find(cand => cand.ID_POSTULACION === idPost);
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Evaluación: ${c.NOMBRE_CANDIDATO}`;
        
        body.innerHTML = `
            <div class="seccion-card" style="background: var(--fondo-seccion); padding: 20px; border-radius: 8px; border: 1px solid #99d5da; margin-bottom:20px;">
                <h3 style="font-size:13px; color:var(--color-primario-dark); margin-bottom:10px; text-transform:uppercase;">Área de Calificación del Reclutador</h3>
                <div class="grid-datos" style="grid-template-columns: 1fr 2fr;">
                    <div class="dato-item">
                        <label class="label">Estatus del Proceso</label>
                        <select id="edit-cand-estatus">
                            <option value="Pendiente" ${c.ESTATUS_PROCESO==='Pendiente'?'selected':''}>Pendiente / Sin Revisar</option>
                            <option value="Filtro Telefónico" ${c.ESTATUS_PROCESO==='Filtro Telefónico'?'selected':''}>Filtro Telefónico</option>
                            <option value="En Entrevista" ${c.ESTATUS_PROCESO==='En Entrevista'?'selected':''}>En Entrevista</option>
                            <option value="Evaluación Técnica" ${c.ESTATUS_PROCESO==='Evaluación Técnica'?'selected':''}>Evaluación Técnica</option>
                            <option value="Contratado" ${c.ESTATUS_PROCESO==='Contratado'?'selected':''}>🎉 Contratado</option>
                            <option value="Rechazado" ${c.ESTATUS_PROCESO==='Rechazado'?'selected':''}>Rechazado</option>
                        </select>
                    </div>
                    <div class="dato-item">
                        <label class="label">Historial de Notas de la Reclutadora</label>
                        <textarea id="edit-cand-notas" placeholder="Escribe aquí observaciones de la entrevista, pretensión económica, etc...">${c.NOTAS_RECLUTADOR || ''}</textarea>
                    </div>
                </div>
                <button class="btn-guardar" onclick="guardarCambiosCand('${c.ID_POSTULACION}')">Guardar Progreso</button>
                <div style="clear:both;"></div>
            </div>

            <div class="seccion-card">
                <div class="section-title">Información del Postulante</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Teléfono</span><span class="valor">${c.TELEFONO}</span></div>
                    <div class="dato-item"><span class="label">Correo Electrónico</span><span class="valor">${c.CORREO}</span></div>
                    <div class="dato-item"><span class="label">Código de Vacante</span><span class="valor">${c.ID_REQUISICION}</span></div>
                    <div class="dato-item">
                        <span class="label">Acción Rápida</span>
                        <span class="valor">
                            <a href="${c.LINK_CV}" target="_blank" style="color:var(--color-primario); font-weight:bold; text-decoration:none; display:block; text-align:center;">📄 Ver Currículum (CV)</a>
                        </span>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    async function guardarCambiosCand(idPost) {
        const nuevoEstatus = document.getElementById('edit-cand-estatus').value;
        const nuevasNotas = document.getElementById('edit-cand-notas').value;
        
        const payload = {
            tipo: "actualizar_candidato",
            idPostulacion: idPost,
            estatusProceso: nuevoEstatus,
            notasReclutador: nuevasNotas
        };

        enviarActualizacion(payload);
    }

    async function guardarCambiosReq(idReq) {
        const nuevoEstatus = document.getElementById('edit-req-estatus').value;
        
        const payload = {
            tipo: "actualizar_requisicion",
            idRequisicion: idReq,
            estatus: nuevoEstatus
        };

        enviarActualizacion(payload);
    }

    async function enviarActualizacion(payload) {
        try {
            cerrarModal();
            document.querySelector('.btn-actualizar').innerText = "Guardando en Sheet...";
            
            const res = await fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            setTimeout(() => {
                document.querySelector('.btn-actualizar').innerText = "Actualizar Panel";
                cargarDatos();
            }, 1200);

        } catch (e) {
            console.error(e);
            alert("No se pudo actualizar el registro.");
        }
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = cargarDatos;
</script>
</body>
</html>
