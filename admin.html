<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HiTalent | Panel de Control</title>
   <style>
        /* PALETA DE COLORES - MODO CLARO GLASSMORPHISM */
        :root {
            --azul-primario: #2563eb; /* Un azul más firme para contrastar en fondo claro */
            --fondo-glass: rgba(255, 255, 255, 0.75); /* Cristal blanco translúcido */
            --borde-glass: rgba(0, 0, 0, 0.08); /* Borde súper sutil para dar volumen */
            --texto-principal: #1e293b; /* Pizarra oscuro para leer fácil */
            --texto-secundario: #64748b; /* Gris medio para etiquetas */
            --bg-seccion: rgba(255, 255, 255, 0.6); /* Fondo semi-blanco para las tarjetas */
            --bg-body: #e2e8f0; /* Fondo de la pantalla sutilmente gris para que resalte el cristal */
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Fondo de la página principal */
        body { 
            background: var(--bg-body); 
            color: var(--texto-principal); 
            padding: 20px; 
            margin: 0; 
        }
        
        /* Contenedor tipo Cristal */
        .container { 
            max-width: 1200px; 
            margin: auto; 
            background: var(--fondo-glass); 
            backdrop-filter: blur(12px); /* Efecto de desenfoque mantenido */
            -webkit-backdrop-filter: blur(12px);
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid var(--borde-glass); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); /* Sombra muy ligera */
        }
        
        /* Controles */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: var(--azul-primario); margin: 0; }
        
        .tabs { display: flex; gap: 10px; }
        button { 
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid var(--borde-glass); 
            color: var(--texto-principal); 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: 600;
        }
        
        button:hover, .active-tab { 
            background: var(--azul-primario); 
            color: white; 
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); 
            border-color: var(--azul-primario);
        }

        /* Botón de actualizar especial */
        button[onclick="cargarDatos()"] {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border-color: rgba(16, 185, 129, 0.2);
        }
        button[onclick="cargarDatos()"]:hover {
            background: #059669;
            color: white;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        /* Tablas */
        .tab-content { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
            background: rgba(255, 255, 255, 0.4); 
            border-radius: 8px;
            overflow: hidden;
        }
        
        th { 
            text-align: left; 
            padding: 15px; 
            color: var(--azul-primario); 
            text-transform: uppercase; 
            font-size: 11px; 
            letter-spacing: 1px; 
            border-bottom: 2px solid var(--borde-glass);
        }
        
        td { 
            padding: 15px; 
            border-bottom: 1px solid var(--borde-glass); 
            font-size: 14px; 
        }
        
        /* Modal de Tarjeta Detallada */
        .modal { 
            display: none; 
            position: fixed; 
            top:0; left:0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.3); /* Overlay oscuro suave para que resalte el modal blanco */
            backdrop-filter: blur(4px);
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
        }
        
        .modal-content { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(15px);
            padding: 0; 
            border-radius: 12px; 
            max-width: 900px; 
            width: 95%; 
            max-height: 90vh; 
            overflow-y: auto; 
            border: 1px solid var(--borde-glass); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .modal-header { 
            position: sticky; 
            top: 0; 
            background: rgba(248, 250, 252, 0.9); 
            backdrop-filter: blur(5px);
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--borde-glass); 
            z-index: 2;
        }
        
        .modal-header h2 { color: var(--azul-primario); }
        .modal-body { padding: 25px; }
        
        .close-btn { 
            cursor: pointer; 
            font-size: 28px; 
            line-height: 1; 
            color: var(--texto-secundario);
            transition: color 0.2s;
        }
        .close-btn:hover { color: var(--texto-principal); }

        /* Bloques de la Tarjeta */
        .seccion-card { 
            background: var(--bg-seccion); 
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-left: 4px solid var(--azul-primario); 
            border-top: 1px solid var(--borde-glass);
            border-right: 1px solid var(--borde-glass);
            border-bottom: 1px solid var(--borde-glass);
        }
        
        .seccion-titulo { 
            color: var(--azul-primario); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            letter-spacing: 1.5px; 
            border-bottom: 1px solid rgba(37, 99, 235, 0.15); 
            padding-bottom: 5px; 
        }
        
        .grid-datos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .dato-item { display: flex; flex-direction: column; }
        
        .label { 
            font-size: 11px; 
            color: var(--texto-secundario); 
            text-transform: uppercase; 
            margin-bottom: 4px; 
            font-weight: 600;
        }
        
        .valor { 
            font-size: 14px; 
            color: var(--texto-principal); 
            line-height: 1.4; 
            font-weight: 500;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>HiTalent Admin</h1>
        <div class="tabs">
            <button class="active-tab" onclick="cambiarVista('req', this)">Requisiciones</button>
            <button onclick="cambiarVista('cand', this)">Candidatos</button>
            <button onclick="cargarDatos()">Actualizar</button>
        </div>
    </div>

    <div id="div-req" class="tab-content active">
        <table id="tabla-req">
            <thead><tr><th>Empresa</th><th>Puesto</th><th>Estatus</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="div-cand" class="tab-content">
        <table id="tabla-cand">
            <thead><tr><th>Nombre</th><th>Puesto</th><th>Estatus</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-titulo" style="margin:0; font-size: 18px;">Detalle de Requisición</h2>
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
        </div>
        <div id="modal-body" class="modal-body"></div>
    </div>
</div>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybqu3o-oT1uOHSfCHDAES2L_-FgZil48c8f7ZKjJ7LC3VjFEnww8WPWtsQhWDIAN8_/exec";

    function cambiarVista(id, btn) {
        document.querySelectorAll('.tab-content').forEach(d => d.classList.remove('active'));
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('div-' + id).classList.add('active');
        btn.classList.add('active-tab');
    }

    async function cargarDatos() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const tbodyReq = document.querySelector('#tabla-req tbody');
            tbodyReq.innerHTML = data.requisiciones.map(item => `
                <tr>
                    <td>${item.EMPRESA_CLIENTE}</td>
                    <td>${item.NOMBRE_POSICION}</td>
                    <td>${item.ESTATUS}</td>
                    <td><button onclick='verDetalleReq(${JSON.stringify(item)})'>Ver Ficha</button></td>
                </tr>
            `).join('');

            const tbodyCand = document.querySelector('#tabla-cand tbody');
            tbodyCand.innerHTML = data.candidatos.map(item => `
                <tr>
                    <td>${item.NOMBRE_CANDIDATO}</td>
                    <td>${item.ID_REQUISICION}</td>
                    <td>${item.ESTATUS_PROCESO}</td>
                    <td><button onclick='verDetalleCand(${JSON.stringify(item)})'>Ver Ficha</button></td>
                </tr>
            `).join('');
        } catch(e) { console.error(e); }
    }

    // Renderizado por bloques para Requisiciones
    function verDetalleReq(d) {
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Requisición: ${d.NOMBRE_POSICION}`;
        
        body.innerHTML = `
            <div class="seccion-card">
                <div class="seccion-titulo">1. Generales</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Solicitante</span><span class="valor">${d.NOMBRE_SOLICITANTE}</span></div>
                    <div class="dato-item"><span class="label">Empresa</span><span class="valor">${d.EMPRESA_CLIENTE}</span></div>
                    <div class="dato-item"><span class="label">Contacto</span><span class="valor">Tel: ${d.TELEFONO_CONTACTO} / Cel: ${d.CELULAR_CONTACTO}</span></div>
                    <div class="dato-item"><span class="label">Email</span><span class="valor">${d.EMAIL_CONTACTO}</span></div>
                    <div class="dato-item"><span class="label">Vacantes</span><span class="valor">${d.NUMERO_VACANTES} (${d.TIPO_VACANTE})</span></div>
                    <div class="dato-item"><span class="label">Ubicación</span><span class="valor">${d.UBICACION}</span></div>
                    <div class="dato-item"><span class="label">Horario</span><span class="valor">${d.HORARIO_LABORAL}</span></div>
                    <div class="dato-item"><span class="label">Reporta a</span><span class="valor">${d.REPORTA_A}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">2. Información del Perfil</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Edad y Edo. Civil</span><span class="valor">${d.EDAD_MIN_MAX} / ${d.ESTADO_CIVIL}</span></div>
                    <div class="dato-item"><span class="label">Género</span><span class="valor">${d.GENERO}</span></div>
                    <div class="dato-item"><span class="label">Escolaridad</span><span class="valor">${d.ESCOLARIDAD}</span></div>
                </div>
                <div style="margin-top:15px">
                    <span class="label">Objetivo del Puesto</span><p class="valor">${d.OBJETIVO_PUESTO}</p>
                    <span class="label">Experiencia e Indispensables</span><p class="valor">${d.EXPERIENCIA_REQUERIDA}<br>${d.REQUISITOS_INDISPENSABLES}</p>
                    <span class="label">Habilidades Tecnológicas</span><p class="valor">${d.HABILIDADES_TECNOLOGICAS}</p>
                </div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">3. Verificación / Actividades</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Competencias</span><span class="valor">${d.COMPETENCIAS_EVALUAR}</span></div>
                </div>
                <div style="margin-top:15px">
                    <span class="label">Actividades a Desempeñar</span><p class="valor">${d.ACTIVIDADES_DESEMPENAR}</p>
                </div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">4. Sueldos y Prestaciones</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Sueldo Bruto/Neto</span><span class="valor">B: ${d.SUELDO_BRUTO} / N: ${d.SUELDO_NETO}</span></div>
                    <div class="dato-item"><span class="label">Esquema / Frecuencia</span><span class="valor">${d.ESQUEMA_PAGO} / ${d.FRECUENCIA_PAGO}</span></div>
                    <div class="dato-item"><span class="label">Prestaciones</span><span class="valor">${d.PRESTACIONES_LEY}<br>${d.PRESTACIONES_SUPERIORES}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">5. Tipo de Contrato</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Contratación</span><span class="valor">${d.TIPO_CONTRATO}</span></div>
                    <div class="dato-item"><span class="label">Periodo de Prueba</span><span class="valor">${d.PERIODO_PRUEBA}</span></div>
                </div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">6. Auto / Transporte</div>
                <div class="valor">${d.REQUISITOS_AUTO_TRANSPORTE}</div>
            </div>

            <div class="seccion-card">
                <div class="seccion-titulo">7. Observaciones Extras</div>
                <div class="valor" style="white-space: pre-wrap;">${d.OBSERVACIONES_EXTRAS}</div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    // Vista simplificada para Candidatos
    function verDetalleCand(c) {
        const body = document.getElementById('modal-body');
        document.getElementById('modal-titulo').innerText = `Candidato: ${c.NOMBRE_CANDIDATO}`;
        body.innerHTML = `
            <div class="seccion-card">
                <div class="seccion-titulo">Datos del Postulante</div>
                <div class="grid-datos">
                    <div class="dato-item"><span class="label">Teléfono</span><span class="valor">${c.TELEFONO}</span></div>
                    <div class="dato-item"><span class="label">Correo</span><span class="valor">${c.CORREO}</span></div>
                    <div class="dato-item"><span class="label">Estatus</span><span class="valor">${c.ESTATUS_PROCESO}</span></div>
                    <div class="dato-item"><span class="label">CV</span><span class="valor"><a href="${c.LINK_CV}" target="_blank" style="color:var(--azul-neon)">Abrir Currículum</a></span></div>
                </div>
            </div>
            <div class="seccion-card">
                <div class="seccion-titulo">Notas del Reclutador</div>
                <div class="valor">${c.NOTAS_RECLUTADOR || 'Sin notas'}</div>
            </div>
        `;
        document.getElementById('modal').style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('modal').style.display = 'none'; }
    window.onload = cargarDatos;
</script>
</body>
</html>
