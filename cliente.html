<!DOCTYPE html>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worketers - Requisición de Personal</title>
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,600,700' rel='stylesheet' type='text/css'>
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check List - Requisición de Personal</title>
  <style>
        /* =========================================================
           SISTEMA DE DISEÑO WORKETERS - MODO CLARO PURO Y LUMINOSO
           ========================================================= */

        :root {
            /* Paleta de Colores Worketers */
            --color-primario: #0096a3;       /* Turquesa principal */
            --color-primario-hover: #2ac2b5; /* Turquesa claro interacciones */
            --color-primario-dark: #26857d;  /* Esmeralda oscuro */
            
            /* Grises y Fondos (Modo Claro) */
            --fondo-pantalla: #f8fafc;
            --fondo-contenedor: #ffffff;
            --fondo-seccion: #eef8f8;        /* Turquesa extra claro para secciones */
            --texto-principal: #334155;
            --texto-etiquetas: #1e293b;
            --borde-suave: #e2e8f0;
        }

        /* Reseteo y Tipografía Global */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--fondo-pantalla);
            color: var(--texto-principal);
            line-height: 1.6;
            padding: 20px;
        }

        /* Contenedor Principal (Tarjeta Limpia) */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--fondo-contenedor);
            padding: 40px;
            border-radius: 12px; /* Bordes amigables */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03); /* Sombra dispersa */
            border: 1px solid var(--borde-suave);
        }

        /* Encabezados de Página */
        .header {
            text-align: center;
            border-bottom: 2px solid var(--borde-suave);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--color-primario);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 13px;
            color: #64748b;
            font-weight: 600;
        }

        /* Títulos de Sección */
        .section-title {
            background-color: var(--fondo-seccion);
            color: var(--color-primario-dark);
            border-left: 4px solid var(--color-primario);
            padding: 10px 15px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 30px;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }

        /* Sistema de Cuadrícula (Grids) */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--texto-etiquetas);
        }

        /* Entradas de Texto y Selects */
        input[type="text"],
        input[type="number"],
        input[type="email"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--borde-suave);
            border-radius: 6px;
            font-size: 14px;
            color: var(--texto-principal);
            background-color: var(--fondo-contenedor);
            transition: all 0.2s ease;
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--color-primario);
            box-shadow: 0 0 0 4px rgba(0, 150, 163, 0.1);
            background-color: var(--fondo-contenedor);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Botones estilo Checkbox y Radio */
        .checkbox-group, .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 5px 0;
        }

        .checkbox-item, .radio-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 14px;
            background-color: var(--fondo-contenedor);
            border: 1px solid var(--borde-suave);
            border-radius: 6px;
            transition: all 0.2s ease;
            color: var(--texto-principal);
        }

        .checkbox-item:hover, .radio-item:hover {
            background-color: var(--fondo-seccion);
            border-color: #99d5da; /* Borde turquesa tenue al pasar el mouse */
        }

        .checkbox-item input, .radio-item input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            accent-color: var(--color-primario);
        }

        /* Botón de Acción Principal */
        .btn-container {
            margin-top: 40px;
            text-align: right;
        }

        .btn-submit, .btn-principal {
            background-color: var(--color-primario);
            color: var(--fondo-contenedor);
            padding: 14px 32px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(0, 150, 163, 0.2);
        }

        .btn-submit:hover, .btn-principal:hover {
            background-color: var(--color-primario-hover);
            box-shadow: 0 6px 8px rgba(0, 150, 163, 0.3);
            transform: translateY(-1px);
        }

        .btn-submit:active, .btn-principal:active {
            transform: scale(0.98);
            box-shadow: 0 2px 4px rgba(0, 150, 163, 0.2);
        }

        .btn-submit:disabled, .btn-principal:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
            color: #f8fafc;
        }

        /* Diseño Responsivo */
        @media (max-width: 768px) {
            .grid-2, .grid-3 {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .container {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Check List - Requisición de Personal</h1>
        <p>(FAVOR DE MARCAR LAS CASILLAS RESPECTIVAS Y LLENAR EN SU TOTALIDAD LOS RECUADROS)</p>
    </div>

    <form id="formRequisicion">
        
        <div class="section-title">1. Generales</div>
        <div class="grid-2">
            <div class="form-group">
                <label for="nombreSolicitante">Nombre del Solicitante *</label>
                <input type="text" id="nombreSolicitante" required placeholder="Ej: Nombre Apellido">
            </div>
            <div class="form-group">
                <label for="empresaCliente">Empresa *</label>
                <input type="text" id="empresaCliente" required placeholder="Ej: Empresa S.A. de C.V.">
            </div>
            <div class="form-group">
                <label for="telefonoContacto">Teléfono Fijo</label>
                <input type="text" id="telefonoContacto" placeholder="Ej: 0000000000">
            </div>
            <div class="form-group">
                <label for="celularContacto">Celular</label>
                <input type="text" id="celularContacto" placeholder="Ej: 0000000000">
            </div>
            <div class="form-group">
                <label for="emailContacto">E-mail / Contacto</label>
                <input type="text" id="emailContacto" placeholder="Ej: correo@empresa.com">
            </div>
            <div class="form-group">
                <label for="nombrePosicion">Nombre de la Posición *</label>
                <input type="text" id="nombrePosicion" required placeholder="Ej: Puesto Solicitado">
            </div>
            <div class="form-group">
                <label for="numeroVacantes">No. de Vacantes</label>
                <input type="number" id="numeroVacantes" min="1" value="1">
            </div>
            <div class="form-group">
                <label>Sobre Vacante</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="tipoVacante" value="Nueva creación" checked> Nueva creación</label>
                    <label class="radio-item"><input type="radio" name="tipoVacante" value="Reemplazo"> Reemplazo</label>
                    <label class="radio-item"><input type="radio" name="tipoVacante" value="Interinato"> Interinato</label>
                </div>
            </div>
            <div class="form-group">
                <label for="ubicacion">Ubicación</label>
                <input type="text" id="ubicacion" placeholder="Ej: Ciudad, Estado">
            </div>
            <div class="form-group">
                <label for="horarioLaboral">Horario</label>
                <input type="text" id="horarioLaboral" placeholder="Ej: L-V 9:00 A 18:00 HRS">
            </div>
            <div class="form-group full-width">
                <label for="reportaA">Reporta a</label>
                <input type="text" id="reportaA" placeholder="Ej: Título del Jefe Directo">
            </div>
        </div>

        <div class="section-title">2. Información del Perfil</div>
        <div class="grid-3">
            <div class="form-group">
                <label for="edadMinMax">Edad Sugerida</label>
                <input type="text" id="edadMinMax" placeholder="Ej: Rango de edad">
            </div>
            <div class="form-group">
                <label for="estadoCivil">Estado Civil</label>
                <select id="estadoCivil">
                    <option value="INDISTINTO">Indistinto</option>
                    <option value="SOLTERO/A">Soltero/a</option>
                    <option value="CASADO/A">Casado/a</option>
                </select>
            </div>
            <div class="form-group">
                <label>Género</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="genero" value="Masculino"> Masc.</label>
                    <label class="radio-item"><input type="radio" name="genero" value="Femenino"> Fem.</label>
                    <label class="radio-item"><input type="radio" name="genero" value="Indistinto" checked> Indist.</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Escolaridad</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="Prepa"> Prepa</label>
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="C. técnica"> C. técnica</label>
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="C. trunca"> C. trunca</label>
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="C. terminada"> C. terminada</label>
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="C. título y cédula"> C. título y cédula</label>
                <label class="checkbox-item"><input type="checkbox" name="escolaridad" value="Otro"> Otro</label>
            </div>
        </div>

        <div class="form-group">
            <label for="objetivoPuesto">Objetivo del Puesto</label>
            <textarea id="objetivoPuesto" placeholder="Escribe el objetivo principal..."></textarea>
        </div>
        <div class="form-group">
            <label for="experienciaRequerida">Experiencia Requerida</label>
            <input type="text" id="experienciaRequerida" placeholder="Ej: Tiempo y áreas de experiencia">
        </div>
        <div class="form-group">
            <label for="requisitosIndispensables">Requisitos Indispensables</label>
            <textarea id="requisitosIndispensables" placeholder="Manejo de sistemas, certificaciones, etc..."></textarea>
        </div>
        <div class="form-group">
            <label for="requisitosDeseables">Requisitos Deseables</label>
            <textarea id="requisitosDeseables" placeholder="Conocimientos adicionales..."></textarea>
        </div>
        <div class="form-group">
            <label for="conocimientosCualidades">Conocimientos y Cualidades Blandas</label>
            <textarea id="conocimientosCualidades" placeholder="Habilidades blandas, aptitudes, etc..."></textarea>
        </div>
        <div class="form-group">
            <label for="habilidadesTecnologicas">Habilidades Tecnológicas</label>
            <input type="text" id="habilitiesTecnologicas" placeholder="Ej: Paquetería Office, Software específico">
        </div>
        <div class="form-group">
            <label for="idiomas">Idiomas</label>
            <input type="text" id="idiomas" placeholder="Ej: Nivel de idioma requerido o N/A">
        </div>

        <div class="section-title">3. Verificación en la Entrevista / Psicometría</div>
        <div class="form-group">
            <label>Habilidades y Capacidades a Evaluar</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Pensamiento crítico"> Pensamiento crítico</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Proactividad"> Proactividad</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Resol. de problemas"> Resol. de problemas</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Creatividad"> Creatividad</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Toma de decisiones"> Toma de decisiones</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Comunicación"> Comunicación</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Trabajo en equipo"> Trabajo en equipo</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Motivación y orientación al cambio"> Motivación</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Trabajo bajo presión"> Trabajo bajo presión</label>
                <label class="checkbox-item"><input type="checkbox" name="competencias" value="Liderazgo"> Liderazgo</label>
            </div>
        </div>
        <div class="form-group">
            <label for="actividadesDesempenar">Actividades a Desempeñar</label>
            <textarea id="actividadesDesempenar" placeholder="• Actividad 1&#10;• Actividad 2&#10;• Actividad 3..."></textarea>
        </div>

        <div class="section-title">4. Sueldos y Prestaciones</div>
        <div class="grid-2">
            <div class="form-group">
                <label for="sueldoBruto">Sueldo Mensual Bruto</label>
                <input type="text" id="sueldoBruto" placeholder="Rango bruto">
            </div>
            <div class="form-group">
                <label for="sueldoNeto">Sueldo Mensual Neto (Base)</label>
                <input type="text" id="sueldoNeto" placeholder="Rango neto">
            </div>
        </div>

        <div class="form-group">
            <label>Prestaciones y Compensaciones</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" id="prestacionesLey" value="Sí"> Prestaciones de Ley</label>
                <label class="checkbox-item"><input type="checkbox" name="compensaciones" value="Comp. variables"> Comp. variables</label>
                <label class="checkbox-item"><input type="checkbox" name="compensaciones" value="Bonos/Comisiones"> Bonos / Comisiones</label>
                <label class="checkbox-item"><input type="checkbox" name="compensaciones" value="Propinas"> Propinas</label>
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label for="prestacionesSuperiores">Prestaciones por Encima de la Ley</label>
                <input type="text" id="prestacionesSuperiores" placeholder="Ej: Fondo de ahorro, seguro de gastos médicos...">
            </div>
            <div class="form-group">
                <label>Esquema de Contratación</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="esquemaPago" value="Nominal" checked> Nominal</label>
                    <label class="radio-item"><input type="radio" name="esquemaPago" value="Honorarios"> Honorarios</label>
                    <label class="radio-item"><input type="radio" name="esquemaPago" value="Mixto"> Mixto</label>
                </div>
            </div>
            <div class="form-group">
                <label>Frecuencia de Pago</label>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="frecuenciaPago" value="Pago quincenal" checked> Quincenal</label>
                    <label class="radio-item"><input type="radio" name="frecuenciaPago" value="Pago semanal"> Semanal</label>
                </div>
            </div>
            <div class="form-group">
                <label>Tipo de Contrato</label>
                <select id="tipoContrato">
                    <option value="Tiempo indeterminado">Tiempo indeterminado</option>
                    <option value="Tiempo determinado">Tiempo determinado</option>
                    <option value="Temporal - evento">Temporal - evento</option>
                </select>
            </div>
            <div class="form-group">
                <label for="periodoPrueba">Período de Prueba</label>
                <input type="text" id="periodoPrueba" placeholder="Ej: Plazo de prueba">
            </div>
        </div>

        <div class="section-title">5. Transporte y Observaciones</div>
        <div class="form-group">
            <label>Requisitos de Auto / Transporte</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Requisito saber manejar"> Requisito saber manejar</label>
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Contar con auto propio"> Contar con auto propio</label>
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Apoyo transporte"> Apoyo transporte</label>
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Licencia manejo"> Licencia manejo</label>
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Licencia de chofer"> Licencia de chofer</label>
                <label class="checkbox-item"><input type="checkbox" name="transporte" value="Moto propia"> Moto propia</label>
            </div>
        </div>

        <div class="form-group">
            <label for="observacionesExtras">Observaciones Extras</label>
            <textarea id="observacionesExtras" style="height: 120px;" placeholder="Beneficios extra, comentarios de cultura laboral..."></textarea>
        </div>

        <div class="btn-container">
            <button type="submit" id="btnGuardar" class="btn-submit">Guardar Requisición</button>
        </div>

    </form>
</div>

<script>
  // 1. ASIGNACIÓN DE LA WEB APP URL GENERADA EN APPS SCRIPT
  const API_URL = "https://script.google.com/macros/s/AKfycbybqu3o-oT1uOHSfCHDAES2L_-FgZil48c8f7ZKjJ7LC3VjFEnww8WPWtsQhWDIAN8_/exec";

  document.getElementById('formRequisicion').addEventListener('submit', function(e) {
      e.preventDefault(); // Detener recarga de pantalla nativa
      
      const boton = document.getElementById('btnGuardar');
      boton.innerText = "Guardando...";
      boton.disabled = true;

      // 2. RECOPILACIÓN Y MAPEO DINÁMICO DE INPUTS MULTI-SELECCIÓN (ARRAY A TEXTO)
      const escolaridades = Array.from(document.querySelectorAll('input[name="escolaridad"]:checked')).map(el => el.value).join(', ');
      const competencias = Array.from(document.querySelectorAll('input[name="competencias"]:checked')).map(el => el.value).join(', ');
      const compensaciones = Array.from(document.querySelectorAll('input[name="compensaciones"]:checked')).map(el => el.value).join(', ');
      const transporte = Array.from(document.querySelectorAll('input[name="transporte"]:checked')).map(el => el.value).join(', ');

      // 3. CONSTRUCCIÓN DEL OBJETO JSON DE ENVÍO
      const payload = {
          nombreSolicitante: document.getElementById('nombreSolicitante').value,
          empresaCliente: document.getElementById('empresaCliente').value,
          telefonoContacto: document.getElementById('telefonoContacto').value,
          celularContacto: document.getElementById('celularContacto').value,
          emailContacto: document.getElementById('emailContacto').value,
          nombrePosicion: document.getElementById('nombrePosicion').value,
          numeroVacantes: document.getElementById('numeroVacantes').value,
          tipoVacante: document.querySelector('input[name="tipoVacante"]:checked').value,
          ubicacion: document.getElementById('ubicacion').value,
          horarioLaboral: document.getElementById('horarioLaboral').value,
          reportaA: document.getElementById('reportaA').value,
          edadMinMax: document.getElementById('edadMinMax').value,
          estadoCivil: document.getElementById('estadoCivil').value,
          genero: document.querySelector('input[name="genero"]:checked').value,
          escolaridad: escolaridades,
          objetivoPuesto: document.getElementById('objetivoPuesto').value,
          experienciaRequerida: document.getElementById('experienciaRequerida').value,
          requisitosIndispensables: document.getElementById('requisitosIndispensables').value,
          requisitosDeseables: document.getElementById('requisitosDeseables').value,
          conocimientosCualidades: document.getElementById('conocimientosCualidades').value,
          habilidadesTecnologicas: document.getElementById('habilitiesTecnologicas').value,
          idiomas: document.getElementById('idiomas').value,
          competenciasEvaluar: competencias,
          actividadesDesempenar: document.getElementById('actividadesDesempenar').value,
          sueldoBruto: document.getElementById('sueldoBruto').value,
          sueldoNeto: document.getElementById('sueldoNeto').value,
          prestacionesLey: document.getElementById('prestacionesLey').checked ? "Sí" : "No",
          prestacionesSuperiores: document.getElementById('prestacionesSuperiores').value,
          compensacionesVariables: compensaciones,
          esquemaPago: document.querySelector('input[name="esquemaPago"]:checked').value,
          frecuenciaPago: document.querySelector('input[name="frecuenciaPago"]:checked').value,
          tipoContrato: document.getElementById('tipoContrato').value,
          periodoPrueba: document.getElementById('periodoPrueba').value,
          requisitosAutoTransporte: transporte,
          observacionesExtras: document.getElementById('observacionesExtras').value
      };

      // 4. DISPARO DE PETICIÓN ASÍNCRONA (FETCH POST) A NUESTRO BACKEND DESACOPLADO
      fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors', // Evita bloqueos de origen cruzado en envíos directos
          headers: {
              'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
      })
      .then(() => {
          alert("¡Gracias, tu peticion fue guardada con exito!");
          document.getElementById('formRequisicion').reset();
          boton.innerText = "Guardar Requisición";
          boton.disabled = false;
      })
      .catch(error => {
          console.error('Error:', error);
          alert("Ocurrió un error al intentar enviar los datos.");
          boton.innerText = "Guardar Requisición";
          boton.disabled = false;
      });
  });
</script>

</body>
</html>
